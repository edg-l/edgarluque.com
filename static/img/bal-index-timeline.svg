<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 160" role="img" aria-labelledby="bal-index-title bal-index-desc">
  <title id="bal-index-title">Block access index timeline</title>
  <desc id="bal-index-desc">Horizontal timeline showing index 0 for pre-execution system contracts, indices 1 through n for transactions, and index n+1 for withdrawals.</desc>
  <style>
    .bg { fill: none; }
    .axis { stroke: #4d7577; stroke-width: 2; }
    .node-tx { fill: #14191F; stroke: #E6E1CF; stroke-width: 2; }
    .node-sys { fill: #14191F; stroke: #7abec2; stroke-width: 2; }
    .idx-label { fill: #7abec2; font-family: 'JetBrains Mono Variable', 'JetBrains Mono', monospace; font-size: 14px; font-weight: 600; text-anchor: middle; }
    .phase-label { fill: #E6E1CF; font-family: 'JetBrains Mono Variable', 'JetBrains Mono', monospace; font-size: 12px; text-anchor: middle; }
    .phase-sub { fill: #E6E1CF; opacity: 0.6; font-family: 'JetBrains Mono Variable', 'JetBrains Mono', monospace; font-size: 11px; text-anchor: middle; }
    .ellipsis { fill: #E6E1CF; opacity: 0.6; font-family: 'JetBrains Mono Variable', 'JetBrains Mono', monospace; font-size: 18px; text-anchor: middle; }
  </style>

  <line x1="60" y1="80" x2="620" y2="80" class="axis" />

  <text x="80"  y="50" class="idx-label">0</text>
  <text x="200" y="50" class="idx-label">1</text>
  <text x="320" y="50" class="idx-label">2</text>
  <text x="500" y="50" class="idx-label">n</text>
  <text x="600" y="50" class="idx-label">n+1</text>

  <circle cx="80"  cy="80" r="10" class="node-sys" />
  <circle cx="200" cy="80" r="10" class="node-tx" />
  <circle cx="320" cy="80" r="10" class="node-tx" />
  <circle cx="500" cy="80" r="10" class="node-tx" />
  <circle cx="600" cy="80" r="10" class="node-sys" />

  <text x="410" y="86" class="ellipsis">···</text>

  <text x="80"  y="110" class="phase-label">system</text>
  <text x="80"  y="128" class="phase-sub">pre-exec</text>

  <text x="200" y="110" class="phase-label">tx 1</text>
  <text x="320" y="110" class="phase-label">tx 2</text>
  <text x="500" y="110" class="phase-label">tx n</text>

  <text x="600" y="110" class="phase-label">withdrawals</text>
  <text x="600" y="128" class="phase-sub">post-exec</text>
</svg>
