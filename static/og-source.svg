<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#14191F"/>

  <!-- Subtle outer border in accent -->
  <rect x="20" y="20" width="1160" height="590" rx="16" fill="none" stroke="#4d7577" stroke-width="2"/>

  <!-- Top-left logo (nested squares, scaled up) -->
  <g transform="translate(80 80)">
    <rect x="-44" y="-44" width="88" height="88" rx="4"
          fill="none" stroke="#4d7577" stroke-width="4"
          transform="translate(44 44)"/>
    <rect x="-30" y="-30" width="60" height="60" rx="4"
          fill="none" stroke="#7abec2" stroke-width="4"
          transform="translate(44 44) rotate(15)"/>
    <rect x="-16" y="-16" width="32" height="32" rx="4"
          fill="#E6E1CF"
          transform="translate(44 44) rotate(30)"/>
  </g>

  <!-- Brand title, all caps, monospace -->
  <text x="200" y="115"
        font-family="JetBrains Mono, monospace"
        font-size="48"
        font-weight="700"
        fill="#E6E1CF"
        letter-spacing="2">EDGAR LUQUE</text>

  <!-- Centered domain -->
  <text x="600" y="345"
        font-family="JetBrains Mono, monospace"
        font-size="84"
        font-weight="700"
        fill="#E6E1CF"
        text-anchor="middle">edgl.dev</text>

  <!-- Tagline -->
  <text x="600" y="410"
        font-family="JetBrains Mono, monospace"
        font-size="28"
        font-weight="400"
        fill="#7abec2"
        text-anchor="middle">Software developer, Ethereum core dev</text>

  <!-- Bottom-left footer line -->
  <text x="80" y="565"
        font-family="JetBrains Mono, monospace"
        font-size="22"
        fill="#E6E1CF"
        opacity="0.6">Rust · EVM · Compilers · Systems</text>

  <!-- Bottom-right small marker -->
  <text x="1120" y="565"
        font-family="JetBrains Mono, monospace"
        font-size="22"
        fill="#E6E1CF"
        opacity="0.6"
        text-anchor="end">edgl.dev</text>
</svg>
